<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<title>og-template — burning-advisor-lp (1200x630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&display=swap" rel="stylesheet">
<style>
 body{margin:0;background:#333}
 .og{width:1200px;height:630px;position:relative;overflow:hidden;box-sizing:border-box;
   background:radial-gradient(130% 90% at 78% 8%,#2a2519,#0f0e0b);font-family:"Shippori Mincho","Hiragino Mincho ProN",serif;color:#f0ece3;
   display:flex;flex-direction:column;justify-content:center;padding:0 96px}
 .og::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 80% 0%,rgba(201,162,74,.18),transparent 60%)}
 .eyebrow{position:relative;z-index:1;color:#c9a24a;font-size:25px;font-weight:700;letter-spacing:.16em;
   display:flex;align-items:center;gap:18px;margin-bottom:34px}
 .eyebrow::before{content:"";width:44px;height:2px;background:currentColor;opacity:.7}
 h1{position:relative;z-index:1;margin:0;font-size:60px;font-weight:600;line-height:1.32;
   letter-spacing:.02em;font-feature-settings:"palt"}
 h1 .ph{display:inline-block}
 h1 .hl{background:linear-gradient(transparent 62%,rgba(201,162,74,.26) 62%);padding:0 .05em;color:#c9a24a}
 .sub{position:relative;z-index:1;margin-top:32px;font-size:29px;font-weight:500;color:#c2bcae;letter-spacing:.03em}
 .brand{position:absolute;right:52px;bottom:38px;z-index:1;font-size:23px;font-weight:700;color:#b6a475;letter-spacing:.08em}
</style></head><body>
<div class="og">
  <div class="eyebrow">AI導入顧問 ／ BURNING ADVISOR</div>
  <h1><span class="ph">毎月ひとつ、御社の業務が</span><br><span class="ph"><span class="hl">AIで軽く</span>なる。</span></h1>
  <div class="sub">月次MTG＋毎月1つ実装＋月報＋チャット相談</div>
  <div class="brand">NEXT GROWTH ／ BURNING BROS.</div>
</div></body></html>
